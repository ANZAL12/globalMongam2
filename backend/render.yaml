databases:
  - name: global_agencies_db
    databaseName: global_agencies
    user: global_agencies_user

services:
  - type: web
    name: global-agencies-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: global_agencies_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://global-agencies-frontend.onrender.com,http://localhost:5173"
